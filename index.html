<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a8c4e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CashSplitter">
  <base href="/cashsplitter-2/">
  <link rel="manifest" href="/cashsplitter-2/manifest.json">
  <link rel="apple-touch-icon" href="/cashsplitter-2/icon.svg">
  <link rel="stylesheet" href="/cashsplitter-2/styles/app.css">
  <title>CashSplitter</title>
  <script>
    let swRegistration = null

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/cashsplitter-2/sw.js', { type: 'module' }).then((reg) => {
        swRegistration = reg

        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing
          if (newWorker) {
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('New SW available — click ↻ to update')
              }
            })
          }
        })
      }).catch((err) => {
        console.error('SW registration failed:', err)
      })

      let reloading = false
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return
        reloading = true
        window.location.reload()
      })
    }

    async function forceSWRefresh() {
      const btn = document.getElementById('sw-refresh-btn')
      btn.classList.add('spinning')
      try {
        if (swRegistration) {
          await swRegistration.update()
          if (swRegistration.waiting) {
            swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' })
            return
          }
        }
        window.location.reload()
      } catch (e) {
        console.error('SW refresh failed:', e)
        window.location.reload()
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    function navigateTo(hash) {
      const path = hash.replace(/^#/, '') || '/'
      let url
      if (path === '/' || path === '') {
        url = '/cashsplitter-2/api/groups'
      } else {
        const match = path.match(/^\/groups\/(.+)$/)
        if (match) {
          url = '/cashsplitter-2/api/groups/' + encodeURIComponent(match[1])
        } else {
          url = '/cashsplitter-2/api/groups'
        }
      }
      if (typeof htmx !== 'undefined') {
        htmx.ajax('GET', url, { target: '#main-content', swap: 'innerHTML' })
      } else {
        document.getElementById('main-content').innerHTML = '<div class="loading-indicator">Loading...</div>'
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      if ('serviceWorker' in navigator && !navigator.serviceWorker.controller) {
        navigator.serviceWorker.addEventListener('controllerchange', function onControlled() {
          navigator.serviceWorker.removeEventListener('controllerchange', onControlled)
          navigateTo(window.location.hash)
        })
      } else {
        navigateTo(window.location.hash)
      }
    })

    window.addEventListener('hashchange', function () {
      navigateTo(window.location.hash)
    })
  </script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">CashSplitter</h1>
    <button id="sw-refresh-btn" class="sw-refresh-btn" title="Force refresh app" onclick="forceSWRefresh()">↻</button>
  </header>

  <main id="main-content">
    <div class="loading-indicator">Loading...</div>
  </main>

  <noscript>
    <div class="noscript-warning">
      CashSplitter requires JavaScript to function. Please enable JavaScript in your browser.
    </div>
  </noscript>

</body>
</html>
